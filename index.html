<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecast App</title>

    <link rel="stylesheet" href="style.css">

    <!-- External Library -->
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
</head>
<body>

    <header>
        <h1>🌤️ Weather Forecast App</h1>
    </header>

    <div class="container">

        <p class="subtitle">
            Search any city to view current weather conditions and a 5-day forecast!
        </p>

        <div class="search-section">

            <input
                type="text"
                id="cityInput"
                placeholder="Please enter a city..."
            >

            <button id="searchBtn">
                Get The Weather!
            </button>

        </div>

        <p id="loading"></p>

        <p id="error"></p>

        <div id="currentWeather"></div>

        <div id="forecast"></div>

    </div>

    <footer>
        <p>
            Weather data is provided by OpenWeatherMap |
            Built with HTML, CSS, and JavaScript @jhodge2026
        </p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
